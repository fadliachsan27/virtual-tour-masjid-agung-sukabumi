<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kegiatan - Masjid Agung Sukabumi</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/events.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    body { padding-top: var(--navbar-h); }
    .section { padding-top: 60px; padding-bottom: 80px; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="17" stroke="#c9a84c" stroke-width="2"/>
      <path d="M18 6 C18 6, 10 14, 10 22 L26 22 C26 14, 18 6, 18 6Z" fill="#c9a84c"/>
      <rect x="15" y="22" width="6" height="8" fill="#c9a84c"/>
    </svg>
    <div><div class="nav-title">Masjid Agung Sukabumi</div><div class="nav-subtitle">VIRTUAL TOUR</div></div>
  </div>
  <div class="nav-links">
    <div class="nav-menu" id="navMenu">
      <a href="index.html" class="nav-link">Beranda</a>
      <a href="event.html" class="nav-link active">Kegiatan</a>
      <a href="galeri.html" class="nav-link">Galeri</a>
      <a href="virtual-tour.html" class="nav-link">Virtual Tour</a>
    </div>
    <button class="btn-theme" id="themeToggle" title="Ganti Tema">
      <span class="icon-light">M</span><span class="icon-dark">S</span>
    </button>
    <a href="admin/login.html" class="btn-admin-icon" title="Login Admin">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </a>
  </div>
</nav>

<section class="section">
  <div class="container">
    <div class="section-header">
      <div class="section-badge">EVENT & KEGIATAN</div>
      <h2 class="section-title">Kegiatan Masjid Agung Sukabumi</h2>
      <p style="color:var(--text-muted);font-size:14px;margin-top:6px;">Agenda kajian, sosial, dan kegiatan umat terbaru</p>
    </div>
    <div class="event-grid" id="eventGrid">
      <div class="event-loading">
        <div class="loading-spinner"></div>
        Memuat kegiatan...
      </div>
    </div>
  </div>
</section>

<footer class="footer"><p>(c) 2025 Masjid Agung Sukabumi Virtual Tour</p></footer>

<script type="module">
import { db } from "./js/firebase.js";
import { initNavbarScroll, initThemeToggle } from "./js/theme.js";
import { escapeHtml, formatEventDate } from "./js/utils.js";
import { collection, getDocs, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

initThemeToggle();
initNavbarScroll();

function renderEmpty(){
  document.getElementById('eventGrid').innerHTML='<div class="event-empty"><div style="font-family:\'Playfair Display\',serif;font-size:22px;color:var(--text);margin-bottom:8px">Belum Ada Kegiatan</div><div>Kegiatan dapat ditambahkan melalui Admin Panel.</div></div>';
}
async function loadEvents(){
  const grid=document.getElementById('eventGrid');
  try {
    const snap=await getDocs(query(collection(db,'events'), orderBy('date','desc')));
    if(snap.empty){ renderEmpty(); return; }
    grid.innerHTML='';
    snap.forEach(d=>{
      const item=d.data();
      const card=document.createElement('article');
      card.className='event-card';
      const media=item.imageBase64
        ? `<img src="${item.imageBase64}" alt="${escapeHtml(item.title||'Kegiatan masjid')}" loading="lazy"/>`
        : `<div class="event-placeholder">EVENT</div>`;
      card.innerHTML=`
        <div class="event-media">${media}</div>
        <div class="event-content">
          <div class="event-meta">
            <span class="event-pill">${formatEventDate(item.date)}</span>
            ${item.time?`<span class="event-pill">${escapeHtml(item.time)}</span>`:''}
          </div>
          <h3 class="event-title">${escapeHtml(item.title||'Kegiatan Masjid')}</h3>
          ${item.location?`<div class="event-pill" style="width:max-content;margin-bottom:12px">${escapeHtml(item.location)}</div>`:''}
          <div class="event-desc">${escapeHtml(item.description||'')}</div>
        </div>`;
      grid.appendChild(card);
    });
  } catch(e){
    console.error(e);
    renderEmpty();
  }
}
loadEvents();
</script>
</body>
</html>
