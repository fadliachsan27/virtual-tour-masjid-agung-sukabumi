<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galeri - Masjid Agung Sukabumi</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    body { padding-top: var(--navbar-h); }
    .section { padding-top: 60px; padding-bottom: 80px; }

    /* ===== GALERI GRID ===== */
    .galeri-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    @media (max-width: 768px) {
      .galeri-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
    @media (max-width: 480px) {
      .galeri-grid { grid-template-columns: 1fr; gap: 10px; }
    }

    .galeri-item {
      aspect-ratio: 4/3; border-radius: 12px; overflow: hidden;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; position: relative;
    }
    .galeri-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s;
    }
    .galeri-item:hover img { transform: scale(1.06); }
    .galeri-item-num {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.7);
      font-size: 11px; padding: 3px 9px; border-radius: 6px;
      opacity: 0; transition: opacity 0.2s;
    }
    .galeri-item:hover .galeri-item-num { opacity: 1; }

    /* Empty state */
    .galeri-empty {
      grid-column: 1/-1; text-align: center; padding: 80px 20px;
      color: var(--text-muted);
    }
    .galeri-empty-icon { font-size: 56px; margin-bottom: 16px; }
    .galeri-empty-title { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 8px; color: var(--text); }
    .galeri-empty-sub { font-size: 14px; }

    /* Loading state */
    .galeri-loading {
      grid-column: 1/-1; text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 14px;
    }
    .loading-spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.94); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .lightbox.active { opacity: 1; pointer-events: all; }
    .lightbox img {
      max-width: 90vw; max-height: 88vh; border-radius: 10px;
      object-fit: contain; box-shadow: 0 20px 80px rgba(0,0,0,0.5);
      transform: scale(0.93); transition: transform 0.3s;
    }
    .lightbox.active img { transform: scale(1); }
    .lightbox-close {
      position: absolute; top: 20px; right: 24px;
      font-size: 28px; color: rgba(255,255,255,0.7); cursor: pointer;
      line-height: 1; transition: color 0.2s; background: none; border: none;
    }
    .lightbox-close:hover { color: #fff; }
    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1); border: none;
      color: #fff; font-size: 22px; padding: 14px 18px;
      border-radius: 10px; cursor: pointer; transition: background 0.2s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }
    .lightbox-counter {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 13px;
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="17" stroke="#c9a84c" stroke-width="2"/>
      <path d="M18 6 C18 6, 10 14, 10 22 L26 22 C26 14, 18 6, 18 6Z" fill="#c9a84c"/>
      <rect x="15" y="22" width="6" height="8" fill="#c9a84c"/>
    </svg>
    <div><div class="nav-title">Masjid Agung Sukabumi</div><div class="nav-subtitle">VIRTUAL TOUR</div></div>
  </div>
  <div class="nav-links">
    <div class="nav-menu" id="navMenu">
      <a href="index.html" class="nav-link">Beranda</a>
      <a href="galeri.html" class="nav-link active">Galeri</a>
      <a href="virtual-tour.html" class="nav-link">Virtual Tour</a>
    </div>
    <button class="btn-theme" id="themeToggle" title="Ganti Tema">
      <span class="icon-light">🌙</span><span class="icon-dark">☀️</span>
    </button>
    <a href="admin/login.html" class="btn-admin-icon" title="Login Admin">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </a>
  </div>
</nav>

<section class="section">
  <div class="container">
    <div class="section-header">
      <div class="section-badge">GALERI FOTO</div>
      <h2 class="section-title">Keindahan Masjid Agung Sukabumi</h2>
    </div>

    <div class="galeri-grid" id="galeriGrid">
      <div class="galeri-loading">
        <div class="loading-spinner"></div>
        Memuat foto galeri...
      </div>
    </div>
  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
  <img id="lightboxImg" src="" alt=""/>
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<footer class="footer"><p>© 2025 Masjid Agung Sukabumi Virtual Tour</p></footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ⚠ GANTI DENGAN CONFIG FIREBASE ANDA
const firebaseConfig = {
  apiKey: "AIzaSyA6b5hiSH7BWAXOWu3_-cwXtMl6J3sTGxA",
  authDomain: "vt-masjid-agung-sukabumi.firebaseapp.com",
  projectId: "vt-masjid-agung-sukabumi",
  storageBucket: "vt-masjid-agung-sukabumi.firebasestorage.app",
  messagingSenderId: "633933684627",
  appId: "1:633933684627:web:fdcaa9d3ff99475e665266",
  measurementId: "G-GG88GW221Z"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// Theme
if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark');
window.addEventListener('scroll',()=>{ document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY>60); });
document.getElementById('themeToggle').addEventListener('click',()=>{
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light');
});

// ===== Galeri dari Firestore (Base64) =====
let galeriSrcs=[], lightboxIdx=0;

async function loadAndRenderGaleri(){
  const grid=document.getElementById('galeriGrid');
  try {
    const snap=await getDocs(query(collection(db,'galeri'), orderBy('order','asc')));
    if(snap.empty){ renderEmpty(grid); return; }
    grid.innerHTML=''; galeriSrcs=[];
    snap.forEach(d=>{
      const item=d.data();
      galeriSrcs.push(item.base64);
      const idx=galeriSrcs.length-1;
      const el=document.createElement('div'); el.className='galeri-item';
      el.onclick=()=>openLightbox(idx);
      el.innerHTML=`<img src="${item.base64}" alt="Foto ${idx+1}" loading="lazy"/>
        <div class="galeri-item-num">${idx+1} / ${snap.size}</div>`;
      grid.appendChild(el);
    });
  } catch(e){ renderEmpty(grid); console.error(e); }
}
function renderEmpty(grid){
  grid.innerHTML='<div class="galeri-empty"><div class="galeri-empty-icon">🖼️</div><div class="galeri-empty-title">Belum Ada Foto</div><div class="galeri-empty-sub">Silakan masukkan foto melalui <a href="admin/login.html" style="color:var(--gold)">Admin Panel</a>.</div></div>';
}

// ===== Lightbox =====
function openLightbox(idx){
  lightboxIdx=idx;
  document.getElementById('lightboxImg').src=galeriSrcs[idx];
  document.getElementById('lightbox').classList.add('active');
  document.getElementById('lightboxCounter').textContent=(idx+1)+' / '+galeriSrcs.length;
}
window.closeLightbox=()=>document.getElementById('lightbox').classList.remove('active');
window.lightboxNav=(dir)=>{
  lightboxIdx=(lightboxIdx+dir+galeriSrcs.length)%galeriSrcs.length;
  document.getElementById('lightboxImg').src=galeriSrcs[lightboxIdx];
  document.getElementById('lightboxCounter').textContent=(lightboxIdx+1)+' / '+galeriSrcs.length;
};
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('active')) return;
  if(e.key==='ArrowLeft')  window.lightboxNav(-1);
  if(e.key==='ArrowRight') window.lightboxNav(1);
  if(e.key==='Escape')     window.closeLightbox();
});
document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target===e.currentTarget) window.closeLightbox(); });

loadAndRenderGaleri();
</script>
</body>
</html>
