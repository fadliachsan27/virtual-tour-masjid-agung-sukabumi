<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galeri - Masjid Agung Sukabumi</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    body { padding-top: var(--navbar-h); }
    .section { padding-top: 60px; padding-bottom: 80px; }

    /* ===== GALERI GRID ===== */
    .galeri-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    @media (max-width: 768px) {
      .galeri-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
    @media (max-width: 480px) {
      .galeri-grid { grid-template-columns: 1fr; gap: 10px; }
    }

    .galeri-item {
      aspect-ratio: 4/3; border-radius: 12px; overflow: hidden;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; position: relative;
    }
    .galeri-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s;
    }
    .galeri-item:hover img { transform: scale(1.06); }
    .galeri-item-num {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.7);
      font-size: 11px; padding: 3px 9px; border-radius: 6px;
      opacity: 0; transition: opacity 0.2s;
    }
    .galeri-item:hover .galeri-item-num { opacity: 1; }

    /* Empty state */
    .galeri-empty {
      grid-column: 1/-1; text-align: center; padding: 80px 20px;
      color: var(--text-muted);
    }
    .galeri-empty-icon { font-size: 56px; margin-bottom: 16px; }
    .galeri-empty-title { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 8px; color: var(--text); }
    .galeri-empty-sub { font-size: 14px; }

    /* Loading state */
    .galeri-loading {
      grid-column: 1/-1; text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 14px;
    }
    .loading-spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.94); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .lightbox.active { opacity: 1; pointer-events: all; }
    .lightbox img {
      max-width: 90vw; max-height: 88vh; border-radius: 10px;
      object-fit: contain; box-shadow: 0 20px 80px rgba(0,0,0,0.5);
      transform: scale(0.93); transition: transform 0.3s;
    }
    .lightbox.active img { transform: scale(1); }
    .lightbox-close {
      position: absolute; top: 20px; right: 24px;
      font-size: 28px; color: rgba(255,255,255,0.7); cursor: pointer;
      line-height: 1; transition: color 0.2s; background: none; border: none;
    }
    .lightbox-close:hover { color: #fff; }
    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1); border: none;
      color: #fff; font-size: 22px; padding: 14px 18px;
      border-radius: 10px; cursor: pointer; transition: background 0.2s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }
    .lightbox-counter {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 13px;
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="17" stroke="#c9a84c" stroke-width="2"/>
      <path d="M18 6 C18 6, 10 14, 10 22 L26 22 C26 14, 18 6, 18 6Z" fill="#c9a84c"/>
      <rect x="15" y="22" width="6" height="8" fill="#c9a84c"/>
    </svg>
    <div><div class="nav-title">Masjid Agung Sukabumi</div><div class="nav-subtitle">VIRTUAL TOUR</div></div>
  </div>
  <div class="nav-links">
    <div class="nav-menu" id="navMenu">
      <a href="index.html" class="nav-link">Beranda</a>
      <a href="galeri.html" class="nav-link active">Galeri</a>
      <a href="virtual-tour.html" class="nav-link">Virtual Tour</a>
    </div>
    <button class="btn-theme" id="themeToggle" title="Ganti Tema">
      <span class="icon-light">🌙</span><span class="icon-dark">☀️</span>
    </button>
    <a href="admin/login.html" class="btn-admin-icon" title="Login Admin">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </a>
  </div>
</nav>

<section class="section">
  <div class="container">
    <div class="section-header">
      <div class="section-badge">GALERI FOTO</div>
      <h2 class="section-title">Keindahan Masjid Agung Sukabumi</h2>
    </div>

    <div class="galeri-grid" id="galeriGrid">
      <div class="galeri-loading">
        <div class="loading-spinner"></div>
        Memuat foto galeri...
      </div>
    </div>
  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
  <img id="lightboxImg" src="" alt=""/>
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<footer class="footer"><p>© 2025 Masjid Agung Sukabumi Virtual Tour</p></footer>

<script>
// Theme
if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
window.addEventListener('scroll', () => {
  document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY > 60);
});
document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
});

// ===== IndexedDB =====
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('virtualTourDB', 3);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('panoramas')) d.createObjectStore('panoramas');
      if (!d.objectStoreNames.contains('galeri')) d.createObjectStore('galeri');
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}
function dbGetAllKeys(db, store) {
  return new Promise(res => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAllKeys();
    req.onsuccess = () => res(req.result || []); req.onerror = () => res([]);
  });
}
function dbGet(db, store, key) {
  return new Promise(res => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result || null); req.onerror = () => res(null);
  });
}

// ===== Load & Render Galeri =====
let galeriURLs = [];
let lightboxIdx = 0;

async function loadAndRenderGaleri() {
  const grid = document.getElementById('galeriGrid');
  try {
    const db = await openDB();
    const keys = await dbGetAllKeys(db, 'galeri');
    const sorted = keys.filter(k => String(k).startsWith('galeri_')).sort((a, b) => {
      const na = parseInt(String(a).split('_')[1]) || 0;
      const nb = parseInt(String(b).split('_')[1]) || 0;
      return na - nb;
    });

    if (sorted.length === 0) {
      // Tampilkan foto default jika galeri kosong
      renderDefault(grid);
      return;
    }

    grid.innerHTML = '';
    galeriURLs = [];

    for (let i = 0; i < sorted.length; i++) {
      const blob = await dbGet(db, 'galeri', sorted[i]);
      if (!blob) continue;
      const url = URL.createObjectURL(blob);
      galeriURLs.push(url);
      const idx = galeriURLs.length - 1;
      const item = document.createElement('div');
      item.className = 'galeri-item';
      item.onclick = () => openLightbox(idx);
      item.innerHTML =
        '<img src="' + url + '" alt="Foto ' + (idx+1) + '" loading="lazy"/>' +
        '<div class="galeri-item-num">' + (idx+1) + ' / ' + sorted.length + '</div>';
      grid.appendChild(item);
    }
  } catch(e) {
    renderDefault(grid);
  }
}

function renderDefault(grid) {
  grid.innerHTML = '';
  
  // Cek apakah ada foto di dalam array defaultPhotos
  if (!defaultPhotos || defaultPhotos.length === 0) {
    // Jika kosong, tampilkan pesan peringatan
    const message = document.createElement('div');
    message.className = 'no-photo-message'; // Anda bisa mengatur styling via CSS
    message.style.textAlign = 'center';
    message.style.padding = '20px';
    message.style.fontWeight = 'bold';
    message.innerText = 'TIDAK ADA FOTO TOLONG MASUKAN DARI ADMIN';
    
    grid.appendChild(message);
  } else {
    // Jika ada, jalankan logika render seperti biasa
    galeriURLs = defaultPhotos;
    defaultPhotos.forEach((src, idx) => {
      const item = document.createElement('div');
      item.className = 'galeri-item';
      item.onclick = () => openLightbox(idx);
      item.innerHTML =
        '<img src="' + src + '" alt="Foto ' + (idx + 1) + '" loading="lazy"/>' +
        '<div class="galeri-item-num">' + (idx + 1) + ' / ' + defaultPhotos.length + '</div>';
      grid.appendChild(item);
    });
  }
}

// ===== Lightbox =====
function openLightbox(idx) {
  lightboxIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
function updateLightbox() {
  document.getElementById('lightboxImg').src = galeriURLs[lightboxIdx];
  document.getElementById('lightboxCounter').textContent = (lightboxIdx+1) + ' / ' + galeriURLs.length;
}
function lightboxNav(dir) {
  lightboxIdx = (lightboxIdx + dir + galeriURLs.length) % galeriURLs.length;
  updateLightbox();
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
});

// Init
loadAndRenderGaleri();
</script>
</body>
</html>
